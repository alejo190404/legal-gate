spring:
  application:
    name: legal-gate-gateway
  main:
    banner-mode: off

server:
  port: ${PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

legalgate:
  gateway:
    forwarded-token: ${LEGALGATE_INTERNAL_SERVICE_TOKEN:}
    request-timeout: ${GATEWAY_REQUEST_TIMEOUT:3s}
    billing-request-timeout: ${GATEWAY_BILLING_REQUEST_TIMEOUT:10s}
    cors:
      allowed-origins: ${LEGALGATE_CORS_ALLOWED_ORIGINS:http://localhost:4200,https://www.legal-gate.co}
      allowed-origin-patterns: ${LEGALGATE_CORS_ALLOWED_ORIGIN_PATTERNS:https://*.vercel.app,https://www.legal-gate.co}
    backend:
      base-url: ${LEGALGATE_BACKEND_URL:}
    workos:
      client-id: ${WORKOS_CLIENT_ID:}
      issuer: ${WORKOS_ISSUER:https://api.workos.com}
      jwks-url: ${WORKOS_JWKS_URL:}

logging:
  level:
    com.legalgate.gateway: INFO
