spring:
  application:
    name: legal-gate-gateway
  main:
    banner-mode: off

server:
  port: ${PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

legalgate:
  gateway:
    api-key: ${GATEWAY_API_KEY:}
    forwarded-token: ${GATEWAY_FORWARDED_TOKEN:}
    request-timeout: ${GATEWAY_REQUEST_TIMEOUT:3s}
    backend:
      base-url: ${LEGALGATE_BACKEND_URL:}

logging:
  level:
    com.legalgate.gateway: INFO
