spring:
  application:
    name: legal-gate-intake-orchestrator
  main:
    banner-mode: off
  datasource:
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_MAX_POOL_SIZE:5}
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:false}
    validate-on-migrate: ${SPRING_FLYWAY_VALIDATE_ON_MIGRATE:false}

legalgate:
  intake:
    persistence: ${LEGALGATE_INTAKE_PERSISTENCE:memory}
    seed-demo-data: ${LEGALGATE_SEED_DEMO_DATA:false}
    email-domain: ${LEGALGATE_INTAKE_EMAIL_DOMAIN:intake.legal-gate.co}
    consultation-classifier-url: ${LEGALGATE_CONSULTATION_CLASSIFIER_URL:}
    consultation-classifier-timeout: ${LEGALGATE_CONSULTATION_CLASSIFIER_TIMEOUT:3s}
    consultation-classifier-prompt-version: ${LEGALGATE_CONSULTATION_CLASSIFIER_PROMPT_VERSION:consultation-classifier-v1}
    consultation-classifier-system-prompt: ${LEGALGATE_CONSULTATION_CLASSIFIER_SYSTEM_PROMPT:You classify inbound legal consultation emails for a Colombian law firm. Select exactly one provided routeIndex and exactly one tenant urgency level. Keep summaries concise, extract a short legal concept, and explain the routing decision.}
    outbound-email-enabled: ${LEGALGATE_OUTBOUND_EMAIL_ENABLED:false}
    cloudmailin-smtp-username: ${LEGALGATE_CLOUDMAILIN_SMTP_USERNAME:}
    cloudmailin-api-token: ${LEGALGATE_CLOUDMAILIN_API_TOKEN:}
    notifications-from-email: ${LEGALGATE_NOTIFICATIONS_FROM_EMAIL:agenda@legal-gate.co}
    notifications-from-name: ${LEGALGATE_NOTIFICATIONS_FROM_NAME:LegalGate Agenda}
    outbound-test-mode: ${LEGALGATE_OUTBOUND_TEST_MODE:false}
    internal-service-token: ${LEGALGATE_INTERNAL_SERVICE_TOKEN}
    workos-api-key: ${WORKOS_API_KEY}
    workos-api-base-url: ${WORKOS_API_BASE_URL:https://api.workos.com}

server:
  port: ${PORT:8081}
  shutdown: graceful
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.legalgate.intake: INFO
