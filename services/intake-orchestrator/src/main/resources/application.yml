spring:
  application:
    name: legal-gate-intake-orchestrator
  main:
    banner-mode: off

server:
  port: ${PORT:8081}
  shutdown: graceful
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.legalgate.intake: INFO
