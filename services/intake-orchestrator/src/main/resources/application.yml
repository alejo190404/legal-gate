spring:
  application:
    name: legal-gate-intake-orchestrator
  main:
    banner-mode: off
  datasource:
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_MAX_POOL_SIZE:5}
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:false}
    validate-on-migrate: ${SPRING_FLYWAY_VALIDATE_ON_MIGRATE:false}

legalgate:
  intake:
    persistence: ${LEGALGATE_INTAKE_PERSISTENCE:memory}
    seed-demo-data: ${LEGALGATE_SEED_DEMO_DATA:false}
    email-domain: ${LEGALGATE_INTAKE_EMAIL_DOMAIN:intake.legal-gate.co}

server:
  port: ${PORT:8081}
  shutdown: graceful
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.legalgate.intake: INFO
