services:
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    environment:
      PORT: 8080
      LEGALGATE_INTERNAL_SERVICE_TOKEN: ${LEGALGATE_INTERNAL_SERVICE_TOKEN:?Set LEGALGATE_INTERNAL_SERVICE_TOKEN}
      WORKOS_CLIENT_ID: ${WORKOS_CLIENT_ID:?Set WORKOS_CLIENT_ID}
      WORKOS_ISSUER: ${WORKOS_ISSUER:-https://api.workos.com}
      WORKOS_JWKS_URL: ${WORKOS_JWKS_URL:?Set WORKOS_JWKS_URL}
      LEGALGATE_BACKEND_URL: ${LEGALGATE_BACKEND_URL:-http://intake-orchestrator:8081}
      LEGALGATE_CORS_ALLOWED_ORIGINS: ${LEGALGATE_CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:8080}
      GATEWAY_REQUEST_TIMEOUT: ${GATEWAY_REQUEST_TIMEOUT:-3s}
      GATEWAY_BILLING_REQUEST_TIMEOUT: ${GATEWAY_BILLING_REQUEST_TIMEOUT:-10s}
    ports:
      - "8080:8080"
    depends_on:
      intake-orchestrator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  intake-orchestrator:
    build:
      context: .
      dockerfile: services/intake-orchestrator/Dockerfile
    environment:
      PORT: 8081
      LEGALGATE_INTAKE_PERSISTENCE: jdbc
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/legalgate?sslmode=disable}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-legalgate}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-legalgate_dev_password}
      SPRING_DATASOURCE_MAX_POOL_SIZE: ${SPRING_DATASOURCE_MAX_POOL_SIZE:-5}
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED:-true}
      SPRING_FLYWAY_VALIDATE_ON_MIGRATE: ${SPRING_FLYWAY_VALIDATE_ON_MIGRATE:-false}
      LEGALGATE_INTAKE_EMAIL_DOMAIN: ${LEGALGATE_INTAKE_EMAIL_DOMAIN:-intake.legal-gate.co}
      LEGALGATE_CONSULTATION_CLASSIFIER_URL: ${LEGALGATE_CONSULTATION_CLASSIFIER_URL:-http://consultation-classifier:8083}
      LEGALGATE_CONSULTATION_CLASSIFIER_TIMEOUT: ${LEGALGATE_CONSULTATION_CLASSIFIER_TIMEOUT:-3s}
      LEGALGATE_INTERNAL_SERVICE_TOKEN: ${LEGALGATE_INTERNAL_SERVICE_TOKEN:?Set LEGALGATE_INTERNAL_SERVICE_TOKEN}
      WORKOS_API_KEY: ${WORKOS_API_KEY:?Set WORKOS_API_KEY}
      LEGALGATE_BILLING_ENABLED: ${LEGALGATE_BILLING_ENABLED:-false}
      LEGALGATE_BILLING_ENFORCEMENT_ENABLED: ${LEGALGATE_BILLING_ENFORCEMENT_ENABLED:-false}
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN:-}
      MERCADOPAGO_WEBHOOK_SECRET: ${MERCADOPAGO_WEBHOOK_SECRET:-}
      MERCADOPAGO_API_URL: ${MERCADOPAGO_API_URL:-https://api.mercadopago.com}
      MERCADOPAGO_PROVIDER_TIMEOUT: ${MERCADOPAGO_PROVIDER_TIMEOUT:-8s}
      LEGALGATE_BILLING_RETURN_URL: ${LEGALGATE_BILLING_RETURN_URL:-http://localhost:4200/?billing=return}
      LEGALGATE_BILLING_RECONCILIATION_INTERVAL: ${LEGALGATE_BILLING_RECONCILIATION_INTERVAL:-5m}
      LEGALGATE_BILLING_PENDING_CHECKOUT_TTL: ${LEGALGATE_BILLING_PENDING_CHECKOUT_TTL:-24h}
      LEGALGATE_BILLING_GRACE_PERIOD: ${LEGALGATE_BILLING_GRACE_PERIOD:-7d}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      consultation-classifier:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  consultation-classifier:
    build:
      context: .
      dockerfile: services/consultation-classifier/Dockerfile
    environment:
      PORT: 8083
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.5-flash}
      GEMINI_TEMPERATURE: ${GEMINI_TEMPERATURE:-0.2}
      CLASSIFIER_LOG_PAYLOADS: ${CLASSIFIER_LOG_PAYLOADS:-false}
      CLASSIFIER_LOG_PREVIEW_CHARS: ${CLASSIFIER_LOG_PREVIEW_CHARS:-500}
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8083/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5

  mail-ingress:
    build:
      context: .
      dockerfile: services/mail-ingress/Dockerfile
    environment:
      PORT: 8082
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/legalgate?sslmode=disable}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-legalgate}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-legalgate_dev_password}
      SPRING_DATASOURCE_MAX_POOL_SIZE: ${SPRING_DATASOURCE_MAX_POOL_SIZE:-5}
      LEGALGATE_CLOUDMAILIN_USERNAME: ${LEGALGATE_CLOUDMAILIN_USERNAME:-cloudmailin-local}
      LEGALGATE_CLOUDMAILIN_PASSWORD: ${LEGALGATE_CLOUDMAILIN_PASSWORD:-cloudmailin-local-password}
      LEGALGATE_MAILERSEND_WEBHOOK_SECRET: ${LEGALGATE_MAILERSEND_WEBHOOK_SECRET:-mailersend-local-secret}
      LEGALGATE_INTAKE_ORCHESTRATOR_URL: ${LEGALGATE_INTAKE_ORCHESTRATOR_URL:-http://intake-orchestrator:8081}
      LEGALGATE_INTERNAL_SERVICE_TOKEN: ${LEGALGATE_INTERNAL_SERVICE_TOKEN:?Set LEGALGATE_INTERNAL_SERVICE_TOKEN}
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      intake-orchestrator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
      args:
        LEGALGATE_API_BASE_URL: ${LEGALGATE_API_BASE_URL:-}
        LEGALGATE_WORKOS_CLIENT_ID: ${LEGALGATE_WORKOS_CLIENT_ID:?Set LEGALGATE_WORKOS_CLIENT_ID}
    ports:
      - "4200:80"
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-legalgate}
      POSTGRES_USER: ${POSTGRES_USER:-legalgate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-legalgate_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - legalgate-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-legalgate} -d ${POSTGRES_DB:-legalgate}"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  legalgate-postgres-data:
