services:
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    environment:
      PORT: 8080
      GATEWAY_FORWARDED_TOKEN: ${GATEWAY_FORWARDED_TOKEN:-local-dev-service-token}
      LEGALGATE_BACKEND_URL: ${LEGALGATE_BACKEND_URL:-http://intake-orchestrator:8081}
      LEGALGATE_CORS_ALLOWED_ORIGINS: ${LEGALGATE_CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:8080}
    ports:
      - "8080:8080"
    depends_on:
      intake-orchestrator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  intake-orchestrator:
    build:
      context: .
      dockerfile: services/intake-orchestrator/Dockerfile
    environment:
      PORT: 8081
      LEGALGATE_INTAKE_PERSISTENCE: jdbc
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/legalgate?sslmode=disable}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-legalgate}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-legalgate_dev_password}
      SPRING_DATASOURCE_MAX_POOL_SIZE: ${SPRING_DATASOURCE_MAX_POOL_SIZE:-5}
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED:-true}
      LEGALGATE_MAIL_ENABLED: ${LEGALGATE_MAIL_ENABLED:-true}
      SPRING_RABBITMQ_HOST: ${SPRING_RABBITMQ_HOST:-rabbitmq}
      SPRING_RABBITMQ_PORT: ${SPRING_RABBITMQ_PORT:-5672}
      SPRING_RABBITMQ_USERNAME: ${SPRING_RABBITMQ_USERNAME:-legalgate}
      SPRING_RABBITMQ_PASSWORD: ${SPRING_RABBITMQ_PASSWORD:-legalgate_rabbitmq_dev_password}
      LEGALGATE_MAIL_EXCHANGE: ${LEGALGATE_MAIL_EXCHANGE:-legalgate.mail}
      LEGALGATE_MAIL_INCOMING_QUEUE: ${LEGALGATE_MAIL_INCOMING_QUEUE:-legalgate.mail.incoming}
      LEGALGATE_MAIL_DEAD_LETTER_QUEUE: ${LEGALGATE_MAIL_DEAD_LETTER_QUEUE:-legalgate.mail.incoming.dlq}
      LEGALGATE_MAIL_ROUTING_KEY: ${LEGALGATE_MAIL_ROUTING_KEY:-mail.inbound.received}
      LEGALGATE_MAIL_DEAD_LETTER_ROUTING_KEY: ${LEGALGATE_MAIL_DEAD_LETTER_ROUTING_KEY:-mail.inbound.dead}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  mail-ingress:
    build:
      context: .
      dockerfile: services/mail-ingress/Dockerfile
    environment:
      PORT: 8082
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/legalgate?sslmode=disable}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-legalgate}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-legalgate_dev_password}
      SPRING_DATASOURCE_MAX_POOL_SIZE: ${SPRING_DATASOURCE_MAX_POOL_SIZE:-5}
      SPRING_RABBITMQ_HOST: ${SPRING_RABBITMQ_HOST:-rabbitmq}
      SPRING_RABBITMQ_PORT: ${SPRING_RABBITMQ_PORT:-5672}
      SPRING_RABBITMQ_USERNAME: ${SPRING_RABBITMQ_USERNAME:-legalgate}
      SPRING_RABBITMQ_PASSWORD: ${SPRING_RABBITMQ_PASSWORD:-legalgate_rabbitmq_dev_password}
      LEGALGATE_CLOUDMAILIN_USERNAME: ${LEGALGATE_CLOUDMAILIN_USERNAME:-cloudmailin-local}
      LEGALGATE_CLOUDMAILIN_PASSWORD: ${LEGALGATE_CLOUDMAILIN_PASSWORD:-cloudmailin-local-password}
      LEGALGATE_MAIL_EXCHANGE: ${LEGALGATE_MAIL_EXCHANGE:-legalgate.mail}
      LEGALGATE_MAIL_ROUTING_KEY: ${LEGALGATE_MAIL_ROUTING_KEY:-mail.inbound.received}
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      intake-orchestrator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
      args:
        LEGALGATE_API_BASE_URL: ${LEGALGATE_API_BASE_URL:-/api/backend}
    ports:
      - "4200:80"
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-legalgate}
      POSTGRES_USER: ${POSTGRES_USER:-legalgate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-legalgate_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - legalgate-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-legalgate} -d ${POSTGRES_DB:-legalgate}"]
      interval: 10s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${SPRING_RABBITMQ_USERNAME:-legalgate}
      RABBITMQ_DEFAULT_PASS: ${SPRING_RABBITMQ_PASSWORD:-legalgate_rabbitmq_dev_password}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - legalgate-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  legalgate-postgres-data:
  legalgate-rabbitmq-data:
